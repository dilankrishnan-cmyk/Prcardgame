<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PR Card Game</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center; margin:0; padding:20px; }
.hidden { display:none; }
button { padding:10px 15px; margin:5px; cursor:pointer; }
input { padding:8px; margin:5px; width:200px; }
.card { width:150px; height:210px; background-size:cover; display:inline-block; margin:5px; border:2px solid #fff; border-radius:8px; }
#marketplace { margin-top:20px; }
.admin-section { margin-top:30px; border-top:2px solid #fff; padding-top:20px; }
</style>
</head>
<body>

<h1>PR Card Game</h1>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="game" class="hidden">
  <h2>Coins: <span id="coins"></span> PR</h2>
  <button onclick="buyPack()">Buy Pack (20 PR)</button>
  <button onclick="logout()">Logout</button>

  <h3>Opened Cards:</h3>
  <div id="opened"></div>

  <h3>Marketplace:</h3>
  <div id="marketplace"></div>

  <div id="adminPanel" class="admin-section hidden">
    <h2>Admin Panel</h2>
    <h3>Add Card</h3>
    <input id="cardName" placeholder="Card Name">
    <input id="cardImage" placeholder="Image URL">
    <input id="cardRarity" placeholder="Rarity (Common/Rare/Legendary)">
    <button onclick="addCard()">Add Card</button>

    <h3>All Users</h3>
    <div id="allUsers"></div>
  </div>
</div>

<script>
// Supabase setup
const supabase = supabase.createClient(
  "sb_publishable_ZwbCbTBsqZqXLxhCfI0GeQ_nc7Zi1dZ",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwaXl1dXBhc2p5bHp1eG9qc3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDkxNTQsImV4cCI6MjA4Nzk4NTE1NH0.KhBQLt4hO5-dczed2efmkaU8Jk27vqY_Sa7VXm-SdkM"
);

let user;
let coins = 100;

// Auth functions
async function register() {
  const { data, error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
  if (error) alert(error.message);
}

async function login() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if (error) alert(error.message);
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// Auth state listener
supabase.auth.onAuthStateChange(async (event, session) => {
  if (!session) return;

  user = session.user;
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  // Load or create profile
  let { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("email", user.email)
    .single();

  if (!data) {
    const insert = await supabase.from("profiles").insert({
      email: user.email,
      coins: 100,
      is_admin: user.email === "dilankrishnan@gmail.com"
    }).select().single();
    data = insert;
  }

  coins = data.coins;
  document.getElementById("coins").textContent = coins;

  loadMarketplace();

  // Show admin panel if admin
  if (data.is_admin) {
    document.getElementById("adminPanel").classList.remove("hidden");
    loadAllUsers();
  }
});

// Buy pack
async function buyPack() {
  if (coins < 20) return alert("Not enough PR Coins!");
  coins -= 20;

  await supabase
    .from("profiles")
    .update({ coins })
    .eq("email", user.email);

  document.getElementById("coins").textContent = coins;
  openPack();
}

// Open pack
async function openPack() {
  const { data: cards } = await supabase.from("cards").select("*");
  if (!cards.length) return alert("No cards in database.");

  const opened = document.getElementById("opened");
  opened.innerHTML = "";

  for (let i = 0; i < 4; i++) {
    const random = cards[Math.floor(Math.random() * cards.length)];
    opened.innerHTML += `<div class="card" style="background-image:url('${random.image}')"></div>`;

    await supabase.from("collections").insert({
      user_id: user.id,
      card_id: random.id
    });
  }

  loadMarketplace();
}

// Load marketplace
async function loadMarketplace() {
  const { data: cards } = await supabase.from("cards").select("*");
  const marketplace = document.getElementById("marketplace");
  marketplace.innerHTML = "";

  if (!cards.length) return marketplace.innerHTML = "No cards available.";

  cards.forEach(card => {
    marketplace.innerHTML += `<div class="card" style="background-image:url('${card.image}')"></div>`;
  });
}

// Admin: Add card
async function addCard() {
  const name = document.getElementById("cardName").value;
  const image = document.getElementById("cardImage").value;
  const rarity = document.getElementById("cardRarity").value;

  if (!name || !image || !rarity) return alert("Fill all fields!");

  await supabase.from("cards").insert({
    name, image, rarity
  });

  alert("Card added!");
  document.getElementById("cardName").value = "";
  document.getElementById("cardImage").value = "";
  document.getElementById("cardRarity").value = "";

  loadMarketplace();
}

// Admin: Load all users
async function loadAllUsers() {
  const { data: users } = await supabase.from("profiles").select("*");
  const container = document.getElementById("allUsers");
  container.innerHTML = "";

  users.forEach(u => {
    container.innerHTML += `<p>${u.email} - Coins: ${u.coins} - Admin: ${u.is_admin ? "Yes" : "No"}</p>`;
  });
}
</script>

</body>
</html>
