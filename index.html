<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PR Card Game</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center; }
.hidden { display:none; }
button { padding:10px; margin:5px; }
.card { width:150px; height:210px; background-size:cover; display:inline-block; margin:5px; }
</style>
</head>
<body>

<h1>PR Card Game</h1>

<!-- Login / Admin -->
<div id="auth">
  <input id="email" placeholder="Enter Admin Email">
  <button onclick="login()">Login as Admin</button>
</div>

<!-- Game for regular users -->
<div id="game" class="hidden">
  <h2>Coins: <span id="coins"></span> PR</h2>
  <button onclick="buyPack()">Buy Pack (20 PR)</button>
  <div id="opened"></div>
  <button onclick="logout()">Logout</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="hidden">
  <h2>Admin Panel</h2>
  <p>Welcome, Admin!</p>
  <button onclick="addCard()">Add Sample Card</button>
  <div id="adminCards"></div>
  <button onclick="logout()">Logout</button>
</div>

<script>
const supabaseUrl = "sb_publishable_ZwbCbTBsqZqXLxhCfI0GeQ_nc7Zi1dZ";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwaXl1dXBhc2p5bHp1eG9qc3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDkxNTQsImV4cCI6MjA4Nzk4NTE1NH0.KhBQLt4hO5-dczed2efmkaU8Jk27vqY_Sa7VXm-SdkM";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

let user;
let coins = 100;

async function login() {
  const email = document.getElementById("email").value;
  
  // Fetch user from Supabase
  let { data, error } = await supabase
    .from('profiles')
    .select('*')
    .eq('email', email)
    .single();
    
  if (error || !data) return alert("Email not found!");
  
  user = data;
  document.getElementById("auth").classList.add("hidden");
  
  if (user.is_admin) {
    document.getElementById("adminPanel").classList.remove("hidden");
    loadAdminCards();
  } else {
    document.getElementById("game").classList.remove("hidden");
    coins = user.coins;
    document.getElementById("coins").textContent = coins;
  }
}

// Admin: Add a sample card
async function addCard() {
  const { data, error } = await supabase.from('cards').insert([
    { name: 'Lightning Tiger', image:'https://via.placeholder.com/150', rarity:'Epic' }
  ]);
  alert("Card added!");
  loadAdminCards();
}

// Admin: display cards
async function loadAdminCards() {
  const { data } = await supabase.from('cards').select('*');
  const adminCards = document.getElementById("adminCards");
  adminCards.innerHTML = data.map(c => `<div>${c.name} (${c.rarity})</div>`).join('');
}

// Game: Buy pack
async function buyPack() {
  if (coins < 20) return alert("Not enough PR Coins");
  coins -= 20;
  await supabase.from("profiles").update({ coins }).eq("id", user.id);
  document.getElementById("coins").textContent = coins;
  openPack();
}

// Game: Open random cards
async function openPack() {
  const { data: cards } = await supabase.from("cards").select("*");
  if (!cards.length) return alert("No cards available.");
  const opened = document.getElementById("opened");
  opened.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const random = cards[Math.floor(Math.random()*cards.length)];
    opened.innerHTML += `<div class="card" style="background-image:url('${random.image}')"></div>`;
    await supabase.from("collections").insert({ user_id: user.id, card_id: random.id });
  }
}

async function logout() {
  user = null;
  location.reload();
}
</script>

</body>
</html>
